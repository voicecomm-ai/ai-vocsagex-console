nebula:
  ngbatis:
    session-life-length: 300000
    check-fixed-rate: 300000
    # space name needs to be informed through annotations(@Space) or xml(space="test")
    # default false(false: Session pool map will not be initialized)
    use-session-pool: false
  hosts: 172.17.20.102:9669
  #  hosts: 127.0.0.1:9669
  username: root
  password: voicecomm
  space:
  pool-config:
    min-conns-size: 1
    max-conns-size: 10
    timeout: 200000
    idle-time: 0
    interval-idle: -1
    wait-time: 6000
    min-cluster-health-rate: 1.0
    enable-ssl: false


cql:
  parser:
    # 更换开发者自定义的 xml 所在位置
    mapper-locations: classpath*:ng-mapper/*.xml # 默认为 mapper/**/*.xml

# 开启 nGQL 输出
logging:
  level:
    # INFO 会一直自动检测
    o.n.c.n.s.IntervalCheckSessionDispatcher: WARN
#    org.nebula.contrib: DEBUG